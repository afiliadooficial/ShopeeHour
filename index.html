<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopeeHour - Achados para sua Casa</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favcom.png">
    <link rel="apple-touch-icon" href="favcom.png">
    
    <style>
        :root {
            --primary-orange: #ff5722;
            --primary-blue: #0046be;
            --bg-gray: #f4f4f4;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        .header-banner {
            width: 100%;
            height: auto;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
            object-fit: contain;
            border-bottom: 4px solid var(--primary-orange);
        }

        /* AJUSTE DO NOVO BANNER 5.5 SEM FUNDO */
        .promo-banner-container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
            background: transparent; /* Garante fundo transparente */
        }
        .promo-banner-container a {
            display: block;
            text-decoration: none;
            background: transparent;
        }
        .promo-banner-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
            /* Removi o border-radius e o box-shadow para não marcar o quadrado branco */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); /* Sombra suave só no desenho da imagem */
        }
        .promo-banner-container img:hover { 
            transform: scale(1.03); 
        }

        /* BARRA DE PESQUISA */
        .search-container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }

        #searchInput {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #searchInput:focus {
            border-color: var(--primary-orange);
        }

        .general-link-container {
            max-width: 1100px;
            margin: 10px auto;
            padding: 0 15px;
            text-align: center;
        }

        .btn-general {
            display: block;
            background-color: var(--primary-orange);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.3);
            transition: transform 0.2s;
        }

        .btn-general:hover { transform: scale(1.02); background-color: #e64a19; }

        .container {
            max-width: 1100px;
            margin: 20px auto 40px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #eee;
        }

        .card:hover { transform: translateY(-8px); }
        .card.hidden { display: none; }

        .discount-badge {
            position: absolute; top: 12px; right: 12px;
            background: var(--primary-orange); color: #fff;
            padding: 4px 10px; border-radius: 20px;
            font-weight: bold; font-size: 0.85rem; z-index: 1;
        }

        .card img { width: 100%; height: 250px; object-fit: cover; }

        .card-body { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }

        .card-body h3 {
            font-size: 0.9rem; margin: 0 0 10px 0; height: 40px;
            line-height: 1.3; overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .price-area { margin-bottom: 10px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 0.8rem; }
        .price { color: var(--primary-orange); font-size: 1.4rem; font-weight: 800; }

        .btn {
            background-color: var(--primary-blue); color: #fff;
            text-align: center; padding: 14px; text-decoration: none;
            border-radius: 8px; font-weight: bold; text-transform: uppercase;
        }

        .trust-bar {
            background: #fff; padding: 20px; margin: 40px auto 0 auto;
            max-width: 1100px; border-radius: 12px 12px 0 0;
            display: flex; justify-content: space-around; align-items: center;
            flex-wrap: wrap; border: 1px dashed #ccc; border-bottom: none;
        }

        .trust-item { text-align: center; flex: 1; min-width: 150px; padding: 10px; }
        .trust-item img { width: 40px; margin-bottom: 8px; }
        .trust-item p { font-size: 0.8rem; margin: 0; font-weight: bold; color: #555; }

        footer { background: #333; color: #fff; text-align: center; padding: 30px 15px; font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card img { height: 160px; }
        }
    </style>
</head>

        function renderizarProdutos(lista) {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "";
            lista.forEach(p => {
                let vendas = Math.floor(Math.random() * 400 + 120);
                let htmlDesconto = p.desconto ? `<div class="discount-badge">-${p.desconto}%</div>` : '';
                let htmlPrecoAntigo = p.precoAntigo ? `<div class="old-price">De R$ ${p.precoAntigo}</div>` : '<div class="old-price" style="visibility:hidden">.</div>';

                vitrine.innerHTML += `
                    <div class="card">
                        ${htmlDesconto}
                        <img src="${p.img}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/250x250?text=ShopeeHour'">
                        <div class="card-body">
                            <h3>${p.nome}</h3>
                            <div class="price-area">
                                ${htmlPrecoAntigo}
                                <div class="price">R$ ${p.precoAtual}</div>
                            </div>
                            <div style="font-size: 0.75rem; color: #777; margin-bottom: 12px;">
                                ⭐ 4.9 | 🔥 ${vendas} vendidos
                            </div>
                            <a class="btn" href="${p.link}" target="_blank">Aproveitar Oferta</a>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarProdutos(filtrados);
        });

        renderizarProdutos(produtos);
